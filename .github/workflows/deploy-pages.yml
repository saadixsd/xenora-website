name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      # Do NOT pass CLAUDE_API_KEY here: Vite would embed it in public JS.
      # For Claude on Pages, add a small HTTPS proxy (Worker / Edge Function) that
      # holds the key, then set repo Variables (not Secrets) below.
      # Never pass private tokens as VITE_* — they are compiled into public JS on GitHub Pages.
      - name: Build Vite site
        env:
          # Supabase: use Actions *Secrets* or *Variables* with these exact names.
          # Secrets take precedence if both are set. (VITE_* values are still baked into
          # public JS — use only the anon/publishable key, never service_role.)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_AI_PROVIDER: ${{ vars.VITE_AI_PROVIDER }}
          VITE_CLAUDE_API_BASE: ${{ vars.VITE_CLAUDE_API_BASE }}
        run: npm run build

      # React Router uses client-side routing; Pages must serve index.html
      # for unknown routes so refreshes don't become 404.
      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
