name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # package-lock.json and package.json are currently out of sync locally,
        # so `npm ci` fails. `npm install` will generate a consistent lockfile in CI.
        run: npm install --no-fund --no-audit

      # Do NOT pass CLAUDE_API_KEY here: Vite would embed it in public JS.
      # For Claude on Pages, add a small HTTPS proxy (Worker / Edge Function) that
      # holds the key, then set repo Variables (not Secrets) below.
      - name: Build Vite site
        env:
          VITE_AI_PROVIDER: ${{ vars.VITE_AI_PROVIDER }}
          VITE_CLAUDE_API_BASE: ${{ vars.VITE_CLAUDE_API_BASE }}
        run: npm run build

      # React Router uses client-side routing; Pages must serve index.html
      # for unknown routes so refreshes don't become 404.
      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
